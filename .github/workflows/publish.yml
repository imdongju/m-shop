name: Publish to GitHub Pages

on:
  schedule:
    # 하루 2회, 시간대를 벌려서 실행 — 회당 5콜이라 어느 1시간 창에도 최대 5콜
    - cron: "0 12 * * *" # 21:00 KST
    - cron: "30 13 * * *" # 22:30 KST
  workflow_dispatch: {}
  push:
    branches: [main]
    paths-ignore:
      - "data/**" # 상태 커밋으로 인한 재실행 방지

permissions:
  contents: write # data/published.json 커밋용
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build static site
        env:
          COUPANG_ACCESS_KEY: ${{ secrets.COUPANG_ACCESS_KEY }}
          COUPANG_SECRET_KEY: ${{ secrets.COUPANG_SECRET_KEY }}
          COUPANG_SUB_ID: ${{ secrets.COUPANG_SUB_ID }}
          ADSENSE_CLIENT: ${{ secrets.ADSENSE_CLIENT }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          SITE_URL: ${{ vars.SITE_URL }}
          TREND: ${{ vars.TREND }}
          # 푸시 빌드는 API 호출 0회 (캐시만) — 쿠팡 시간당 한도 보호
          # 예약/수동 실행도 회당 5콜 (통설 한도 10의 절반, 실수로 2번 겹쳐도 10 이하)
          API_BUDGET: ${{ github.event_name == 'push' && '0' || '5' }}
        run: npm run build

      - name: Persist published state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "상태 변화 없음"
          else
            git commit -m "chore: update published state [skip ci]"
            git push
          fi

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - id: deploy
        uses: actions/deploy-pages@v4
