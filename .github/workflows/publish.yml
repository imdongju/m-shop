name: Publish to GitHub Pages

on:
  schedule:
    # 2시간마다 × 3콜 — 같은 키를 쓰는 VPS 블로그(affiliate_new, 시간당 ~3콜)와 합산해도
    # 어느 1시간 창에서든 최대 3+3=6콜 (한도 10, 여유 4)
    - cron: "0 */2 * * *"
  workflow_dispatch: {}
  push:
    branches: [main]
    paths-ignore:
      - "data/**" # 상태 커밋으로 인한 재실행 방지

permissions:
  contents: write # data/published.json 커밋용
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build static site
        env:
          COUPANG_ACCESS_KEY: ${{ secrets.COUPANG_ACCESS_KEY }}
          COUPANG_SECRET_KEY: ${{ secrets.COUPANG_SECRET_KEY }}
          COUPANG_SUB_ID: ${{ secrets.COUPANG_SUB_ID }}
          ADSENSE_CLIENT: ${{ secrets.ADSENSE_CLIENT }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          SITE_URL: ${{ vars.SITE_URL }}
          TREND: ${{ vars.TREND }}
          # 푸시 빌드는 API 호출 0회 (캐시만) — 쿠팡 시간당 한도(10회)는 VPS 블로그와 공유
          # 예약/수동 실행은 회당 3콜: VPS(~3콜/h)와 합산해도 시간당 최대 6콜
          API_BUDGET: ${{ github.event_name == 'push' && '0' || '3' }}
        run: npm run build

      - name: Persist published state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "상태 변화 없음"
          else
            git commit -m "chore: update published state [skip ci]"
            git push
          fi

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - id: deploy
        uses: actions/deploy-pages@v4
